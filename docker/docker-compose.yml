version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gearhead-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gearhead
      POSTGRES_PASSWORD: gearhead_secret
      POSTGRES_DB: gearhead_db
    ports:
      - '5432:5432'
    volumes:
      - gearhead_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gearhead -d gearhead_db']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gearhead-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - gearhead_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gearhead_postgres_data:
  gearhead_redis_data:
